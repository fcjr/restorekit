<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1710"/>
      <stop offset="1" stop-color="#070604"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.42" r="0.6">
      <stop offset="0" stop-color="#e8a33d" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#e8a33d" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- tile -->
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#tile)"/>
  <rect x="0" y="0" width="1024" height="1024" rx="224" fill="url(#glow)"/>
  <rect x="3" y="3" width="1018" height="1018" rx="221" fill="none" stroke="#e8a33d" stroke-opacity="0.12" stroke-width="2"/>

  <!-- brand mark: the design's rounded box + amber waveform, scaled up.
       Source mark lives on a 32-unit grid centered at (16,16); scaled 21x and
       translated so it lands dead-center on the 1024 tile. -->
  <g transform="translate(176,176) scale(21)">
    <rect x="7" y="7" width="18" height="18" rx="3" fill="#100e09" stroke="#e6e2d6" stroke-width="1.7"/>
    <path d="M4 16 H10 L12.2 11 L16 21 L19 16 H28" fill="none" stroke="#e8a33d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
