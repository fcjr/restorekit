# cargo-about config for the desktop app's dependency licenses.
# Regenerate the bundled attribution with `pnpm gen:licenses` (see scripts/).
accepted = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "MPL-2.0",
    "LGPL-2.1",
    "LGPL-2.1-only",
    "LGPL-2.1-or-later",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "CC0-1.0",
    "OpenSSL",
    "0BSD",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
]

# Only care about what actually ships in the app binary.
ignore-build-dependencies = true
ignore-dev-dependencies = true
