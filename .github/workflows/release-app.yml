name: release-app

# Builds and releases the desktop app for macOS and Linux. Runs on the same
# version tags as the CLI release; the .dmg/.app (macOS) and .deb/.AppImage
# (Linux) are attached to the GitHub Release.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-app:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, ubuntu-22.04]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool pkg-config cmake autoconf-archive

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf \
            build-essential autoconf automake libtool pkg-config cmake autoconf-archive \
            libusb-1.0-0-dev libssl-dev libcurl4-openssl-dev zlib1g-dev

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend deps
        working-directory: apps/desktop
        run: npm ci

      - name: Build & stage the privileged DFU helper
        working-directory: apps/desktop
        run: bash ./stage-helper.sh

      - name: Write the App Store Connect API key
        if: runner.os == 'macOS'
        # The secret comes in via env (not inlined in the command) and is stored
        # base64-encoded — single-line base64 is masked reliably; a multi-line
        # PEM is not. The file lands in RUNNER_TEMP, which is wiped after the job.
        env:
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        run: |
          mkdir -p "$RUNNER_TEMP/asc"
          printf '%s' "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$RUNNER_TEMP/asc/AuthKey.p8"

      - name: Build & release the app
        uses: tauri-apps/tauri-action@v0
        with:
          projectPath: apps/desktop
          tagName: ${{ github.ref_name }}
          releaseName: "RestoreKit ${{ github.ref_name }}"
          releaseDraft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS Developer ID signing + notarization (ignored on Linux).
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_PATH: ${{ runner.temp }}/asc/AuthKey.p8
