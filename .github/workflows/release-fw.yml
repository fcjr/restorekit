name: release-fw

# Publish dongle firmware. Tag the commit `dongle-lite-v<version>` (matching
# crates/dongle-lite-fw's crate version, which is embedded in the USB
# bcdDevice field) and this attaches:
#   - dongle-lite-fw.bin   the raw update image `restorekit dongle update`
#                          fetches when it finds a newer release
#   - dongle-lite-full.uf2 the factory/recovery image (bootloader + app)

on:
  push:
    tags: ["dongle-lite-v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      # The embedded version comes from the crate; a tag that doesn't match it
      # would publish a release that misreports itself to every dongle.
      - name: Check tag matches the crate version
        run: |
          tag_version="${GITHUB_REF_NAME#dongle-lite-v}"
          crate_version=$(sed -n 's/^version = "\(.*\)"/\1/p' crates/dongle-lite-fw/Cargo.toml)
          if [ "$tag_version" != "$crate_version" ]; then
            echo "tag is v$tag_version but crates/dongle-lite-fw is v$crate_version" >&2
            exit 1
          fi

      - name: Install Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --no-self-update --component llvm-tools
          rustup default stable
          rustup target add thumbv8m.main-none-eabihf
          cargo install flip-link cargo-binutils --locked

      # picotool stamps the rp2350-arm-s UF2 family id (elf2uf2-rs only knows
      # RP2040). Packaged in Ubuntu 24.04 universe.
      - name: Install picotool
        run: sudo apt-get update && sudo apt-get install -y picotool

      - name: Build firmware and bootloader
        run: |
          cd crates/dongle-lite-fw && cargo build --release --locked
          cd ../dongle-lite-boot && cargo build --release --locked

      - name: Stage release assets
        run: |
          # The .bin is the raw ACTIVE-slot image; on RP2350 there's no .boot2.
          ( cd crates/dongle-lite-fw && cargo objcopy --release -- -O binary target/dongle-lite-fw.bin )
          ( cd crates/dongle-lite-boot && cargo objcopy --release -- -O binary target/dongle-lite-boot.bin )
          boot=crates/dongle-lite-boot/target/dongle-lite-boot
          fw=crates/dongle-lite-fw/target/dongle-lite-fw
          picotool uf2 convert "$boot.bin" -t bin -o 0x10000000 --family rp2350-arm-s "$boot.uf2"
          picotool uf2 convert "$fw.bin"   -t bin -o 0x10007000 --family rp2350-arm-s "$fw.uf2"
          node scripts/merge-uf2.mjs --fill 0x10006000:4096 \
              "$boot.uf2" "$fw.uf2" \
              crates/dongle-lite-fw/target/dongle-lite-full.uf2

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#dongle-lite-v}"
          # --latest=false: the repo's "Latest" release must stay on the
          # newest app/CLI release — the desktop updater fetches
          # releases/latest/download/latest.json, and humans landing on
          # /releases/latest expect the software, not dongle firmware.
          gh release create "$GITHUB_REF_NAME" \
            --latest=false \
            --title "Dongle Lite firmware $version" \
            --notes "Install on a connected dongle with \`restorekit dongle update\`. \
          \`dongle-lite-full.uf2\` is the factory/recovery image (bootloader + app) for the RP2350 bootrom." \
            crates/dongle-lite-fw/target/dongle-lite-fw.bin \
            crates/dongle-lite-fw/target/dongle-lite-full.uf2
