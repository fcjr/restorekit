name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
          - os: ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config cmake autoconf-archive \
            libusb-1.0-0-dev libssl-dev libcurl4-openssl-dev zlib1g-dev

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool pkg-config cmake autoconf-archive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --workspace

  # Windows is a separate job (not a `test` matrix entry) because it needs the
  # GNU toolchain and an MSYS2 MINGW64 shell: the vendored C stack is built with
  # autotools, which can't target MSVC.
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            make
            autoconf
            automake
            libtool
            autoconf-archive
            gettext-devel
            pkgconf
            perl
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-nasm

      # GNU host toolchain: build scripts link with ld, not MSVC's link.exe
      # (which MSYS2's coreutils `link` would shadow in the MINGW64 shell).
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable-x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Test (windows-gnu, static C stack under MSYS2)
        shell: msys2 {0}
        run: |
          export PATH="/c/Users/runneradmin/.cargo/bin:$PATH"
          cargo test --workspace --target x86_64-pc-windows-gnu
