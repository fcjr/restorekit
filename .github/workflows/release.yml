name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  # Publish the crates to crates.io, in dependency order. Skipped with
  # --no-verify: ci.yml is the build gate, and verifying here would rebuild the
  # whole C stack three times. The vendored C sources ship inside the -sys
  # package (2.2 MiB), so it builds on a consumer's machine without submodules.
  crates:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p restorekit-sys --no-verify
          cargo publish -p restorekit --no-verify
          cargo publish -p restorekit-cli --no-verify

  build:
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: macos-14
            goos: darwin
            goarch: arm64
            target: aarch64-apple-darwin
          - os: macos-15-intel
            goos: darwin
            goarch: amd64
            target: x86_64-apple-darwin
          - os: ubuntu-24.04
            goos: linux
            goarch: amd64
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            goos: linux
            goarch: arm64
            target: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential autoconf automake libtool pkg-config cmake autoconf-archive \
            libusb-1.0-0-dev libssl-dev libcurl4-openssl-dev zlib1g-dev

      - name: Install macOS build deps
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool pkg-config cmake autoconf-archive

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build (self-contained static binary)
        run: cargo build --release --locked -p restorekit-cli

      - name: Stage artifact
        run: |
          mkdir -p "artifacts/restorekit_${{ matrix.goos }}_${{ matrix.goarch }}"
          cp target/release/restorekit \
            "artifacts/restorekit_${{ matrix.goos }}_${{ matrix.goarch }}/restorekit"

      - uses: actions/upload-artifact@v4
        with:
          name: restorekit_${{ matrix.goos }}_${{ matrix.goarch }}
          path: artifacts/restorekit_${{ matrix.goos }}_${{ matrix.goarch }}
          if-no-files-found: error

  # Windows builds with the GNU toolchain inside MSYS2 (the autotools C stack
  # can't target MSVC). Uploads the same artifact shape as the `build` matrix so
  # the `release` job's GoReleaser step packages it alongside the others.
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            make
            autoconf
            automake
            libtool
            autoconf-archive
            gettext-devel
            pkgconf
            perl
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-nasm

      # GNU host toolchain: build scripts link with ld, not MSVC's link.exe
      # (which MSYS2's coreutils `link` would shadow in the MINGW64 shell).
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: stable-x86_64-pc-windows-gnu

      - uses: Swatinem/rust-cache@v2

      - name: Build (self-contained static binary)
        shell: msys2 {0}
        run: |
          export PATH="/c/Users/runneradmin/.cargo/bin:$PATH"
          cargo build --release --locked -p restorekit-cli --target x86_64-pc-windows-gnu

      - name: Stage artifact
        shell: msys2 {0}
        run: |
          mkdir -p "artifacts/restorekit_windows_amd64"
          cp target/x86_64-pc-windows-gnu/release/restorekit.exe \
            "artifacts/restorekit_windows_amd64/restorekit.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: restorekit_windows_amd64
          path: artifacts/restorekit_windows_amd64
          if-no-files-found: error

  release:
    needs: [build, build-windows]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: restorekit_*
          merge-multiple: false

      - name: Mark binaries executable
        run: chmod +x artifacts/*/restorekit artifacts/*/restorekit.exe

      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # One token for both the Homebrew tap and the Scoop bucket.
          TAP_GITHUB_TOKEN: ${{ secrets.GORELEASER_GITHUB_TOKEN }}
          # Classic PAT (public_repo): pushes manifests to the fcjr/winget-pkgs
          # fork and opens the PR against microsoft/winget-pkgs.
          WINGET_GITHUB_TOKEN: ${{ secrets.WINGET_GITHUB_TOKEN }}
