name: ci-windows

# Spike: build the CLI (and its idevicerestore C stack) on Windows via MSYS2 /
# MinGW + the x86_64-pc-windows-gnu toolchain. Isolates the hard part — getting
# the autotools stack to compile on Windows — from the Tauri app build.
#
# Manual-only for now: the Windows port is a work in progress (the autotools
# stack doesn't yet regenerate cleanly under MSYS2). Trigger it from the Actions
# tab while iterating; it won't gate normal pushes.
on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            make
            autoconf
            automake
            libtool
            autoconf-archive
            gettext-devel
            pkgconf
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-nasm
            perl

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Diagnose autotools macros
        shell: msys2 {0}
        run: |
          echo "--- progtest.m4 present? ---"
          ls -la /usr/share/aclocal/progtest.m4 2>&1 || echo "MISSING"
          echo "--- who references progtest.m4 in the aclocal dir? ---"
          grep -rl progtest /usr/share/aclocal/ 2>/dev/null || echo "no references"
          echo "--- which package provides progtest.m4? ---"
          pacman -Fy >/dev/null 2>&1 || true
          pacman -F progtest.m4 2>&1 | head || true
          echo "--- gettext / gettext-devel m4 files installed ---"
          pacman -Ql gettext 2>/dev/null | grep -iE "aclocal.*\.m4" | head || true
          pacman -Ql gettext-devel 2>/dev/null | grep -iE "aclocal.*\.m4" | head || true

      - name: Build the CLI (windows-gnu, C stack under MSYS2)
        shell: msys2 {0}
        run: |
          export PATH="/c/Users/runneradmin/.cargo/bin:$PATH"
          cargo build -p restorekit-cli --target x86_64-pc-windows-gnu
