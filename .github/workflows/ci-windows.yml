name: ci-windows

# Spike: build the CLI (and its idevicerestore C stack) on Windows via MSYS2 /
# MinGW + the x86_64-pc-windows-gnu toolchain. Isolates the hard part — getting
# the autotools stack to compile on Windows — from the Tauri app build.
on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - ".github/workflows/ci-windows.yml"
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            make
            autoconf
            automake
            libtool
            autoconf-archive
            gettext-devel
            pkgconf
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-libusb
            mingw-w64-x86_64-nasm
            perl

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Build the CLI (windows-gnu, C stack under MSYS2)
        shell: msys2 {0}
        run: |
          export PATH="/c/Users/runneradmin/.cargo/bin:$PATH"
          cargo build -p restorekit-cli --target x86_64-pc-windows-gnu
