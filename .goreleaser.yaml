version: 2

project_name: restorekit

# Binaries are built natively per-platform in CI (the self-contained static C
# stack can't be zig cross-compiled) and downloaded into ./artifacts before
# goreleaser runs. Here we only assemble/package them. The `prebuilt` builder
# is GoReleaser Pro-only, so the OSS build stage is shimmed: gobinary points
# at a script that copies artifacts/restorekit_<os>_<arch>/restorekit instead
# of compiling.
builds:
  - id: restorekit
    binary: restorekit
    tool: ./scripts/goreleaser-prebuilt.sh
    no_main_check: true
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    # Only amd64 is built for Windows (see build-windows in release.yml).
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: restorekit
    ids: [restorekit]
    formats: [tar.gz]
    # Windows users expect a .zip.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  # The CLI ships as the `restorekit-cli` formula; the plain `restorekit` token
  # is reserved for the desktop app cask. The installed binary is still
  # `restorekit`. A formula (not a cask) is the right fit for a bare CLI binary:
  # `brew install fcjr/fcjr/restorekit-cli` needs no `--cask`, and Homebrew does
  # not quarantine formula downloads, so no Gatekeeper-strip hook is needed.
  - name: restorekit-cli
    repository:
      owner: fcjr
      name: homebrew-fcjr
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/fcjr/restorekit"
    description: "DFU-restore Apple Silicon Macs from the command line"
    license: Apache-2.0
    install: |
      bin.install "restorekit"
    test: |
      system "#{bin}/restorekit", "--version"
    caveats: |
      restorekit triggers DFU mode only from an Apple Silicon Mac host, and
      needs root for that step (sudo restorekit dfu). Restores run on macOS
      and Linux.

scoops:
  # Same naming rationale as the cask: the plain `restorekit` name is reserved
  # for the desktop app. The installed binary is still `restorekit`.
  - name: restorekit-cli
    repository:
      owner: fcjr
      name: scoop-fcjr
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/fcjr/restorekit"
    description: "DFU-restore Apple Silicon Macs from the command line"
    license: Apache-2.0

release:
  github:
    owner: fcjr
    name: restorekit
