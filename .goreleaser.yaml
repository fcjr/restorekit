version: 2

project_name: restorekit

# Binaries are built natively per-platform in CI (the self-contained static C
# stack can't be zig cross-compiled) and downloaded into ./artifacts before
# goreleaser runs. Here we only assemble/package them. The `prebuilt` builder
# is GoReleaser Pro-only, so the OSS build stage is shimmed: gobinary points
# at a script that copies artifacts/restorekit_<os>_<arch>/restorekit instead
# of compiling.
builds:
  - id: restorekit
    binary: restorekit
    tool: ./scripts/goreleaser-prebuilt.sh
    no_main_check: true
    goos: [darwin, linux, windows]
    goarch: [amd64, arm64]
    # Only amd64 is built for Windows (see build-windows in release.yml).
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: restorekit
    ids: [restorekit]
    formats: [tar.gz]
    # Windows users expect a .zip.
    format_overrides:
      - goos: windows
        formats: [zip]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    files:
      - LICENSE
      - NOTICE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

homebrew_casks:
  # The CLI ships as `restorekit-cli`; the plain `restorekit` cask token is
  # reserved for the desktop app. The installed binary is still `restorekit`.
  - name: restorekit-cli
    binaries: [restorekit]
    repository:
      owner: fcjr
      name: homebrew-fcjr
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/fcjr/restorekit"
    description: "DFU-restore Apple Silicon Macs from the command line"
    # Unsigned binary: strip the quarantine bit so Gatekeeper doesn't block it.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr",
                           args: ["-dr", "com.apple.quarantine", "#{staged_path}/restorekit"]
          end
    caveats: |
      restorekit triggers DFU mode only from an Apple Silicon Mac host, and
      needs root for that step (sudo restorekit dfu). Restores run on macOS
      and Linux.

scoops:
  # Same naming rationale as the cask: the plain `restorekit` name is reserved
  # for the desktop app. The installed binary is still `restorekit`.
  - name: restorekit-cli
    repository:
      owner: fcjr
      name: scoop-fcjr
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/fcjr/restorekit"
    description: "DFU-restore Apple Silicon Macs from the command line"
    license: Apache-2.0

winget:
  # Same naming rationale as the cask/scoop: `fcjr.RestoreKit` is reserved for
  # the desktop app (published from release-app.yml via wingetcreate). Each
  # release pushes manifests to the fcjr/winget-pkgs fork and opens a PR
  # against microsoft/winget-pkgs.
  - name: RestoreKit CLI
    publisher: Frank Chiarulli Jr.
    package_identifier: fcjr.RestoreKit.CLI
    short_description: "DFU-restore Apple Silicon Macs from the command line"
    license: Apache-2.0
    homepage: "https://github.com/fcjr/restorekit"
    publisher_url: "https://github.com/fcjr"
    publisher_support_url: "https://github.com/fcjr/restorekit/issues"
    release_notes_url: "https://github.com/fcjr/restorekit/releases/tag/v{{ .Version }}"
    tags: [dfu, macos, restore, apple-silicon]
    repository:
      owner: fcjr
      name: winget-pkgs
      token: "{{ .Env.WINGET_GITHUB_TOKEN }}"
      branch: "fcjr.RestoreKit.CLI-{{ .Version }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

release:
  github:
    owner: fcjr
    name: restorekit
